<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey-Form</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="head-container">
        <div>
          <h1>freeCodeCamp Survey Form</h1>
        </div>

        <div>
          <p>Thank you for taking the time to help us improve the platform</p>
        </div>
      </div>
    </header>

    <main>
      <form>
        <div class="form-container">
          <article>
            <div class="personal-info">
              <div class="form-group">
                <div class="form-focus">
                  <input type="text" name="name" id="Name" value="" placeholder="  " required class="form-input">
                  <label for="Name" class="form-label">Enter your Name</label>
                </div>
                <!--Để thẻ label ở dưới input tại lát nữa mình sẽ CSS nếu input focus + label tất là sẽ trỏ tới label nếu để ở trên thì cái selector + không được nha do + là sẽ tới thẳng dưới của thằng nằm trước dấu +. Ví dụ input:focus + p là thẻ p sẽ được css nếu input được focus dấu + ý nghĩa nó là thể á mọi người nên tìm hiểu sâu hơn về selector trong CSS nha nó hay lắm á! -->
              </div>

              <div class="form-group">
                <div class="form-focus">
                  <input type="text" name="email" id="Email" value="" placeholder=" " required class="form-input">
                  <label for="Email" class="form-label">Enter your Email</label>
                </div>
              </div>

              <div class="form-group">
                <div class="form-focus">
                  <input type="number" name="age" id="Age" value="" min="10" max="99" placeholder=" " required
                    class="form-input">
                  <label for="Age" class="form-label">Age</label>
                </div>
              </div>

              <div class="form-group">
                <div>
                  <label for="Role">Which option best describes your current role?</label>
                </div>

                <select name="role" id="Role">
                  <option value="" disabled>Select current role</option>

                  <option value="">Student</option>

                  <option value="">Full Time Job</option>

                  <option value="">Full Time Learner</option>

                  <option value="">Prefer not to say</option>

                  <option value="">Other</option>
                </select>
              </div>

              <div class="form-group">
                <div>
                  <label for="Recommend">Would you recommend freeCodeCamp to a friend?</label>
                </div>

                <div>
                  <div>
                    <label>
                      <input type="radio" name="recommend" class="input-ratio" value="" checked>
                      Definitely
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="radio" name="recommend" class="input-ratio" value="" checked>
                      Maybe
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="radio" name="recommend" value="" class="input-ratio" checked>
                      Not Sure
                    </label>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <div>
                  <label for="Feature">What is your favorite feature of freeCodeCamp?</label>
                </div>

                <div>
                  <select name="feature" id="Feature">
                    <option value="" disabled selected>Select an option</option>

                    <option value="">Challenges</option>

                    <option value="">Projects</option>

                    <option value="">Community</option>

                    <option value="">Open Source</option>
                  </select>
                </div>
              </div>
            </div>
          </article>

          <article>
            <div class="personal-suggestion">
              <div class="form-group">
                <div>
                  <label for="Improve">What would you like to see improved? (Check all that apply)</label>
                </div>

                <div>
                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Front-end Projects
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Back-end Projects
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Data Visualization
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Challenges
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Open Source Community
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Gitter help rooms
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Videos
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      City Meetups
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Wiki
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Forum
                    </label>
                  </div>

                  <div>
                    <label>
                      <input type="checkbox" name="improve" value="" class="input-checkbox">
                      Additional Courses
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <article>
            <div class="personal-comment">
              <div class="form-group">
                <div>
                  <label for="Comment">Any comments or suggestions?</label>
                </div>

                <div>
                  <textarea name="comment" id="Comment" cols="30" rows="10"
                    placeholder="Enter your comment here..."></textarea>
                </div>
              </div>
            </div>
          </article>

          <article>
            <div class="foot-container">
              <button class="button"> <!--Mấy cái span là để làm mấy đường line di chuyển xung quanh cái button khi đưa
                chuột vào cái button hay chữ Submit á -->
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span>Submit</span>
              </button>
            </div>
          </article>
      </form>
    </main>
  </div>
</body>

</html>
